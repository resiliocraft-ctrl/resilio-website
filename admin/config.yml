backend:
  name: github
  repo: your-github-username/your-repo-name  # Replace with your actual repo
  branch: main
  base_url: https://api.netlify.com  # Keep this for auth
  auth_endpoint: auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    format: "json"
    file: "products.json"
    fields:
      - label: "Products"
        name: "products"
        widget: "list"
        fields:
          - {label: "ID", name: "id", widget: "number", value_type: "int"}
          - {label: "Product Name", name: "name", widget: "string"}
          - {label: "Price", name: "price", widget: "string"}
          - label: "Category"
            name: "category"
            widget: "select"
            options: ["handbags", "tote", "mini", "backpack", "travel", "unisex", "accessories"]
          - {label: "Description", name: "description", widget: "text"}
          - label: "Images"
            name: "images"
            widget: "list"
            field: {label: "Image Path", name: "image", widget: "image"}
          - {label: "Tag", name: "tag", widget: "string", required: false}
          - {label: "In Stock", name: "inStock", widget: "boolean", default: true}
          - {label: "Featured", name: "featured", widget: "boolean", default: false}
