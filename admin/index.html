<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilio Artistry - Admin</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #0f0f0f; 
            color: #fff;
            min-height: 100vh;
        }
        
        /* LOGIN SCREEN */
        #login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f0f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-box h1 {
            color: #d4af37;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .login-box p {
            color: #666;
            margin-bottom: 30px;
        }
        
        #login-password {
            width: 100%;
            padding: 14px 16px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 16px;
        }
        
        #login-password:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        #login-btn {
            width: 100%;
            padding: 14px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        #login-btn:hover {
            background: #c4a030;
        }
        
        #login-error {
            color: #dc2626;
            font-size: 14px;
            margin-top: 12px;
            min-height: 20px;
        }
        
        /* ADMIN APP - HIDDEN BY DEFAULT */
        #admin-app {
            display: none;
            min-height: 100vh;
        }
        
        /* Admin Styles */
        .admin-header {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #d4af37;
        }
        
        .logout-btn {
            padding: 8px 16px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .admin-nav {
            display: flex;
            gap: 4px;
            padding: 0 24px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        
        .nav-btn {
            padding: 16px 24px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        
        .nav-btn:hover { color: #fff; }
        .nav-btn.active {
            color: #d4af37;
            border-bottom-color: #d4af37;
        }
        
        .admin-content {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 600;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #d4af37;
            color: #000;
        }
        
        .btn-secondary {
            background: #333;
            color: #fff;
        }
        
        .hidden { display: none !important; }
        
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN WITH PASSWORD -->
    <div id="login-screen">
        <div class="login-box">
            <h1>⚡ Resilio</h1>
            <p>Admin Dashboard</p>
            
            <!-- PASSWORD INPUT -->
            <input 
                type="password" 
                id="login-password" 
                placeholder="Enter password"
                autocomplete="off"
            >
            
            <button id="login-btn" type="button">
                Sign In
            </button>
            
            <p id="login-error"></p>
            
            <p style="margin-top: 16px; font-size: 12px; color: #555;">
                Password: <code style="background: #0f0f0f; padding: 2px 6px; border-radius: 4px;">admin123</code>
            </p>
        </div>
    </div>

    <!-- ADMIN APP (HIDDEN INITIALLY) -->
    <div id="admin-app">
        <header class="admin-header">
            <div class="logo">⚡ Resilio Artistry</div>
            <button class="logout-btn" id="logout-btn" type="button">Logout</button>
        </header>
        
        <nav class="admin-nav">
            <button class="nav-btn active" data-tab="products">🛍️ Products</button>
            <button class="nav-btn" data-tab="pages">📄 Pages</button>
            <button class="nav-btn" data-tab="media">🖼️ Media</button>
            <button class="nav-btn" data-tab="settings">⚙️ Settings</button>
        </nav>

        <main class="admin-content">
            <!-- Products Tab -->
            <div id="tab-products" class="tab-content">
                <div class="section-header">
                    <h2 class="section-title">Products</h2>
                    <button class="btn btn-primary">+ Add Product</button>
                </div>
                <p>Welcome to Admin! Products will appear here.</p>
            </div>

            <!-- Other Tabs (Hidden) -->
            <div id="tab-pages" class="tab-content hidden">
                <h2>Pages</h2>
                <p>Page editor coming soon...</p>
            </div>
            
            <div id="tab-media" class="tab-content hidden">
                <h2>Media Library</h2>
                <p>Media upload coming soon...</p>
            </div>
            
            <div id="tab-settings" class="tab-content hidden">
                <h2>Settings</h2>
                <p>Site settings coming soon...</p>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // PASSWORD PROTECTION
        // ============================================
        
        const CORRECT_PASSWORD = 'admin123';
        
        // Get elements
        const loginScreen = document.getElementById('login-screen');
        const adminApp = document.getElementById('admin-app');
        const passwordInput = document.getElementById('login-password');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const errorDisplay = document.getElementById('login-error');
        const toast = document.getElementById('toast');
        
        // LOGIN FUNCTION
        function login() {
            const password = passwordInput.value;
            
            if (password === CORRECT_PASSWORD) {
                // Success - show admin
                loginScreen.style.display = 'none';
                adminApp.style.display = 'block';
                errorDisplay.textContent = '';
                showToast('Welcome to Admin Panel!');
            } else {
                // Wrong password
                errorDisplay.textContent = 'Wrong password! Try: admin123';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }
        
        // LOGOUT FUNCTION
        function logout() {
            loginScreen.style.display = 'flex';
            adminApp.style.display = 'none';
            passwordInput.value = '';
        }
        
        // Event listeners
        loginBtn.addEventListener('click', login);
        
        logoutBtn.addEventListener('click', logout);
        
        // Enter key on password field
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
        
        // TAB NAVIGATION
        const navButtons = document.querySelectorAll('.nav-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        
        navButtons.forEach(button => {
            button.addEventListener('click', function() {
                const tabName = this.getAttribute('data-tab');
                
                // Update active nav
                navButtons.forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
                
                // Show correct tab
                tabContents.forEach(content => {
                    content.classList.add('hidden');
                });
                document.getElementById('tab-' + tabName).classList.remove('hidden');
            });
        });
        
        // TOAST FUNCTION
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }
        
        console.log('Admin loaded. Password: admin123');
    </script>
</body>
</html>
