<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilio Artistry - Admin</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #0f0f0f; 
            color: #fff;
            min-height: 100vh;
        }
        
        /* LOGIN SCREEN - FORCE SHOW */
        #login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f0f 100%);
            display: flex !important; /* Force show */
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-box h1 {
            color: #d4af37;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .login-box p {
            color: #666;
            margin-bottom: 30px;
        }
        
        #login-password {
            width: 100%;
            padding: 14px 16px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 16px;
        }
        
        #login-password:focus {
            outline: none;
            border-color: #d4af37;
        }
        
        #login-btn {
            width: 100%;
            padding: 14px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        #login-btn:hover {
            background: #c4a030;
        }
        
        #login-error {
            color: #dc2626;
            font-size: 14px;
            margin-top: 12px;
            min-height: 20px;
        }
        
        /* ADMIN APP - FORCE HIDE INITIALLY */
        #admin-app {
            display: none !important; /* Force hide */
            min-height: 100vh;
        }
        
        /* When logged in, JavaScript will change these */
        .logged-in #login-screen {
            display: none !important;
        }
        
        .logged-in #admin-app {
            display: block !important;
        }
        
        /* Rest of your styles... */
        .admin-header {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #d4af37;
        }
        
        .logout-btn {
            padding: 8px 16px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .admin-nav {
            display: flex;
            gap: 4px;
            padding: 0 24px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        
        .nav-btn {
            padding: 16px 24px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        
        .nav-btn:hover { color: #fff; }
        .nav-btn.active {
            color: #d4af37;
            border-bottom-color: #d4af37;
        }
        
        .admin-content {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 600;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #d4af37;
            color: #000;
        }
        
        .btn-secondary {
            background: #333;
            color: #fff;
        }
        
        .btn-danger {
            background: #dc2626;
            color: #fff;
        }
        
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .hidden { display: none !important; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <h1>⚡ Resilio</h1>
            <p>Admin Dashboard</p>
            
            <!-- SIMPLE FORM - NO COMPLEX LOGIC -->
            <input 
                type="password" 
                id="login-password" 
                placeholder="Enter password"
                autocomplete="off"
            >
            
            <button id="login-btn" onclick="doLogin()">
                Sign In
            </button>
            
            <p id="login-error"></p>
            
            <p style="margin-top: 16px; font-size: 12px; color: #555;">
                Password: <code style="background: #0f0f0f; padding: 2px 6px; border-radius: 4px;">admin123</code>
            </p>
        </div>
    </div>

    <!-- ADMIN APP -->
    <div id="admin-app">
        <header class="admin-header">
            <div class="logo">⚡ Resilio Artistry</div>
            <button class="logout-btn" onclick="doLogout()">Logout</button>
        </header>
        
        <nav class="admin-nav">
            <button class="nav-btn active" onclick="showTab('products')">🛍️ Products</button>
            <button class="nav-btn" onclick="showTab('pages')">📄 Pages</button>
            <button class="nav-btn" onclick="showTab('media')">🖼️ Media</button>
            <button class="nav-btn" onclick="showTab('settings')">⚙️ Settings</button>
        </nav>

        <main class="admin-content">
            <div id="tab-products" class="tab-content">
                <div class="section-header">
                    <h2 class="section-title">Products</h2>
                    <button class="btn btn-primary" onclick="addProduct()">+ Add Product</button>
                </div>
                <div id="product-list">Loading...</div>
            </div>
            
            <div id="tab-pages" class="tab-content hidden">
                <h2>Pages</h2>
                <p>Page editor coming soon...</p>
            </div>
            
            <div id="tab-media" class="tab-content hidden">
                <h2>Media Library</h2>
                <p>Media upload coming soon...</p>
            </div>
            
            <div id="tab-settings" class="tab-content hidden">
                <h2>Settings</h2>
                <p>Settings coming soon...</p>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // ULTRA SIMPLE LOGIN - NO COMPLEXITY
        // ============================================
        
        const CORRECT_PASSWORD = 'admin123';
        
        function doLogin() {
            console.log('Login button clicked'); // Debug
            
            const passwordInput = document.getElementById('login-password');
            const errorDisplay = document.getElementById('login-error');
            const password = passwordInput.value;
            
            console.log('Entered password:', password); // Debug
            
            if (password === CORRECT_PASSWORD) {
                console.log('Password correct!'); // Debug
                
                // SUCCESS - Show admin
                document.body.classList.add('logged-in');
                errorDisplay.textContent = '';
                
                // Initialize admin
                initAdmin();
                
            } else {
                console.log('Password wrong'); // Debug
                errorDisplay.textContent = 'Wrong password! Try: admin123';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }
        
        function doLogout() {
            document.body.classList.remove('logged-in');
            document.getElementById('login-password').value = '';
        }
        
        // Allow Enter key
        document.getElementById('login-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
        
        // ============================================
        // ADMIN FUNCTIONS
        // ============================================
        
        function initAdmin() {
            console.log('Admin initialized'); // Debug
            showToast('Welcome to Admin!');
            loadProducts();
        }
        
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.add('hidden');
            });
            
            // Show selected tab
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            
            // Update nav buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        function addProduct() {
            showToast('Add product clicked - feature coming soon!');
        }
        
        function loadProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = '<p>No products yet. Click "Add Product" to create one.</p>';
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // ============================================
        // SUPABASE SETUP (Optional - for later)
        // ============================================
        
        // Replace with your credentials when ready
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY';
        
        let supabase = null;
        
        function initSupabase() {
            if (typeof window.supabase !== 'undefined' && 
                SUPABASE_URL.includes('YOUR_PROJECT_ID') === false) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('Supabase ready');
                return true;
            }
            return false;
        }
        
        // Try to init Supabase on load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded'); // Debug
            initSupabase();
        });
    </script>
</body>
</html>
