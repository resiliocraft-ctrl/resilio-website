<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
font-family:system-ui;

color:#fff;
margin:0;
}

#login-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f0f;
}

#admin{display:none;padding:20px}

.product{
background:#1a1a1a;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

.product img{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;

}

#drop{
border:2px dashed #555;
padding:40px;
text-align:center;
margin-bottom:20px;

}

</head>
<body>

<div id="login-screen">

<div>

<h2>Resilio Admin</h2>

<input id="pass" type="password" placeholder="password">

<p>Password: admin123</p>

</div>

</div>

<div id="admin">

<h2>Products</h2>

<div id="drop">
Drag bag images here
</div>

<button onclick="addProduct()">Add Product</button>

<div id="products"></div>

<hr>

<h2>Orders</h2>

<div id="orders"></div>

</div>

<script>

/* --------------------
SUPABASE
-------------------- */

let supabase = null;

try{
supabase = window.supabase.createClient(
""https://vvciwiamcorrifpibsmm.supabase.co",
",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2Y2l3aWFtY29ycmlmcGlic21tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjE3NjYsImV4cCI6MjA5MDc5Nzc2Nn0.zKgXSwpQUeaUX6gn93Pdssd284MuSevwmzovr9Tr4M0"
);
}catch(e){
console.log("Supabase failed to load,e");
}

/* --------------------
LOGIN
-------------------- */

function login(){

if(document.getElementById("pass").value==="admin123"){

document.getElementById("login-screen").style.display="none"
document.getElementById("admin").style.display="block"

loadProducts()
loadOrders()

}

}

/* --------------------
IMAGE UPLOAD
-------------------- */

async function uploadImage(file){

const name = Date.now()+"-"+file.name

await supabase.storage
.from("product-images")
.upload(name,file)

const {data}=supabase.storage
.from("product-images")
.getPublicUrl(name)

return data.publicUrl

}

/* --------------------
ADD PRODUCT
-------------------- */

async function addProduct(){

const name = prompt("Product name")
const price = prompt("Price")

if(!name || !price) return

const files = window.selectedFiles || []

const images=[]

for(const file of files){

const url = await uploadImage(file)

images.push(url)

}

await supabase.from("products")
.insert([{name,price,images}])

window.selectedFiles=[]

loadProducts()

}

/* --------------------
LOAD PRODUCTS
-------------------- */

async function loadProducts(){

const {data}=await supabase
.from("products")
.select("*")
.order("created_at",{ascending:false})

const box=document.getElementById("products")

box.innerHTML=""

data.forEach(p=>{

const div=document.createElement("div")

div.className="product"

div.innerHTML=`

${p.images?.map(i=>`<img src="${i}">`).join("")}

<b>${p.name}</b>

<br>

₦${p.price}

<br>

<button onclick="editProduct('${p.id}')">Edit</button>

<button onclick="deleteProduct('${p.id}')">Delete</button>

`

box.appendChild(div)

})

}

/* --------------------
EDIT PRODUCT
-------------------- */

async function editProduct(id){

const name = prompt("New name")

const price = prompt("New price")

await supabase
.from("products")
.update({name,price})
.eq("id",id)

loadProducts()

}

/* --------------------
DELETE PRODUCT
-------------------- */

async function deleteProduct(id){

if(!confirm("Delete product?")) return

await supabase
.from("products")
.delete()
.eq("id",id)

loadProducts()

}

/* --------------------
DRAG DROP
-------------------- */

const drop=document.getElementById("drop")

window.selectedFiles=[]

drop.addEventListener("dragover",e=>{
e.preventDefault()
})

drop.addEventListener("drop",e=>{

e.preventDefault()

window.selectedFiles=[...e.dataTransfer.files]

alert(window.selectedFiles.length+" images ready")

})

/* --------------------
ORDERS
-------------------- */

async function loadOrders(){

const {data}=await supabase
.from("orders")
.select("*")
.order("created_at",{ascending:false})

const box=document.getElementById("orders")

box.innerHTML=""

data.forEach(o=>{

const div=document.createElement("div")

div.className="product"

div.innerHTML=`

Order #${o.id}

<br>

${o.customer_name}

<br>

₦${o.total}

<br>

Status: ${o.status}

`

box.appendChild(div)

})

}

/* --------------------
PAYSTACK
-------------------- */

function pay(price,email){

PaystackPop.setup({

key:"YOUR_PAYSTACK_PUBLIC_KEY",

email:email,

amount:price*100,

currency:"NGN",

callback:function(){

alert("Payment complete")

}

}).openIframe()

}

</script>

</body>
</html>
